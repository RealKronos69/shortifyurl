<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>protectedUrl</title>
    <style>

    </style>
</head>

<body>
    <div class="container h-screen bg-gray-800 flex justify-center items-center">
        <div class="bg-gray-900 flex p-5 rounded-2xl">
            <input class="passinput p-3 focus:outline-0" placeholder="enter a password" type="text" name="" id="">
            <button class="bg-gray-700 text-white font-bold focus:outline-0 p-3 btn">></button>
        </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const btn = document.querySelector('.btn')
        btn.addEventListener('click', async () => {
            const params = new URLSearchParams(window.location.search)
            const short = params.get("shorturl");
            const pass = document.querySelector('.passinput').value
            if (pass === '') {
                console.log('enter the password first')
                return
            }
            const response = await fetch(`http://localhost:3000/protected`, {
                method: 'POST',
                headers: {
                    'Content-type': 'application/json'
                },
                body: JSON.stringify({ password: pass, shorturl: short })
            })
            const data = await response.json()
            if (data.success) {
                window.location.href = data.url
            }

            if (response.status === 401) {
                console.log('wrong password')
                return
            }
        })
    </script>
</body>

</html>
